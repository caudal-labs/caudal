name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        run: mvn clean verify -B

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: caudal_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Testcontainers integration tests
        run: mvn clean verify -pl server -B -Dgroups=testcontainers

  docker:
    needs: [build, integration-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with Buildpacks (versioned tag)
        run: >
          mvn -pl server spring-boot:build-image -B -DskipTests
          -Ddocker.image.tag=${{ github.event.release.tag_name }}

      - name: Tag latest
        run: >
          docker tag
          ghcr.io/caudal-labs/caudal-server:${{ github.event.release.tag_name }}
          ghcr.io/caudal-labs/caudal-server:latest

      - name: Push images
        run: |
          docker push ghcr.io/caudal-labs/caudal-server:${{ github.event.release.tag_name }}
          docker push ghcr.io/caudal-labs/caudal-server:latest
